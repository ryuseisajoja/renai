<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恋愛相性タイプ診断 💕</title>
  <style>
    :root {
      --pink: #f06292;
      --pink-light: #fce4ec;
      --pink-pale: #fff8fb;
      --purple: #9c6fc9;
      --purple-light: #ede0f8;
      --text-dark: #2d2d2d;
      --text-mid: #555;
      --text-light: #999;
      --white: #ffffff;
      --shadow: 0 8px 32px rgba(200,100,150,0.13);
      --shadow-sm: 0 3px 12px rgba(0,0,0,0.07);
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: linear-gradient(145deg, #fff0f7 0%, #f3e5ff 55%, #e8f4fd 100%);
      min-height: 100vh;
      color: var(--text-dark);
    }

    /* ── Header ── */
    header { text-align: center; padding: 44px 20px 28px; }
    .header-emojis { font-size: 2.2rem; letter-spacing: 5px; margin-bottom: 10px; }
    header h1 {
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      font-weight: 900;
      background: linear-gradient(135deg, #f06292, #9c6fc9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1.3; margin-bottom: 8px;
    }
    header p { color: var(--text-mid); font-size: 0.9rem; }

    /* ── Layout ── */
    main { max-width: 780px; margin: 0 auto; padding: 0 14px 80px; }

    /* ── Card ── */
    .card {
      background: var(--white); border-radius: var(--radius);
      padding: 30px; margin-bottom: 20px; box-shadow: var(--shadow);
    }

    /* ── Tabs ── */
    .nav-tabs {
      display: flex; gap: 6px; margin-bottom: 24px;
      background: var(--pink-pale); border-radius: 50px; padding: 5px;
    }
    .nav-tab {
      flex: 1; padding: 9px 4px; border: none; border-radius: 50px;
      cursor: pointer; font-size: 0.8rem; font-weight: 700;
      color: var(--text-mid); background: transparent; transition: all 0.22s;
    }
    .nav-tab.active {
      background: linear-gradient(135deg, #f06292, #9c6fc9);
      color: white; box-shadow: 0 4px 14px rgba(240,98,146,0.32);
    }
    .section { display: none; }
    .section.active { display: block; }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 24px; }
    .progress-labels { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-light); margin-bottom: 5px; }
    .progress-bar { height: 5px; background: var(--pink-light); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #f06292, #9c6fc9); border-radius: 99px; transition: width 0.4s ease; }

    /* ── Question ── */
    .q-anim { animation: fadeUp 0.35s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .q-badge {
      display: inline-block; background: linear-gradient(135deg, #f06292, #9c6fc9);
      color: white; font-size: 0.72rem; font-weight: 700; padding: 3px 12px;
      border-radius: 50px; margin-bottom: 10px;
    }
    .q-axis-hint { font-size: 0.75rem; color: var(--text-light); margin-bottom: 6px; }
    .q-text { font-size: 1.1rem; font-weight: 800; line-height: 1.55; margin-bottom: 18px; }
    .options { display: flex; flex-direction: column; gap: 9px; }
    .opt-btn {
      width: 100%; padding: 13px 16px; border: 2px solid #f3e5f5;
      border-radius: 13px; background: white; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; color: var(--text-dark);
      text-align: left; transition: all 0.18s; display: flex; align-items: center; gap: 10px;
    }
    .opt-btn:hover { border-color: var(--pink); background: var(--pink-pale); transform: translateX(4px); }
    .opt-btn.selected { border-color: var(--pink); background: linear-gradient(135deg, #fff0f7, #f3e5ff); }
    .opt-num {
      width: 26px; height: 26px; border-radius: 50%; background: var(--pink-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 800; color: var(--pink); flex-shrink: 0;
    }
    .opt-btn.selected .opt-num { background: linear-gradient(135deg, #f06292, #9c6fc9); color: white; }

    /* ── Buttons ── */
    .nav-btns { display: flex; gap: 10px; margin-top: 24px; }
    .btn { flex: 1; padding: 13px; border: none; border-radius: 13px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-prev { background: var(--pink-pale); color: var(--pink); }
    .btn-prev:hover { background: var(--pink-light); }
    .btn-next { background: linear-gradient(135deg, #f06292, #9c6fc9); color: white; box-shadow: 0 4px 14px rgba(240,98,146,0.28); }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(240,98,146,0.38); }
    .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-outline { width: 100%; padding: 13px; border: 2px solid var(--pink); border-radius: 13px; background: white; color: var(--pink); font-size: 0.93rem; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.18s; }
    .btn-outline:hover { background: var(--pink-pale); }
    .btn-full { width: 100%; padding: 14px; border: none; border-radius: 13px; background: linear-gradient(135deg, #f06292, #9c6fc9); color: white; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 14px rgba(240,98,146,0.28); transition: all 0.2s; }
    .btn-full:hover { transform: translateY(-2px); }
    .btn-full:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Loading ── */
    .loading-wrap { text-align: center; padding: 60px 20px; }
    .pulse { font-size: 3.2rem; animation: pulse 0.85s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.25);} }

    /* ── 4×4 Grid (type map) ── */
    .grid-wrap { position: relative; }
    .axis-label-top {
      display: flex; justify-content: space-between; font-size: 0.72rem;
      color: var(--text-light); padding: 0 0 4px; font-weight: 600;
    }
    .grid-body { display: flex; gap: 4px; }
    .axis-label-left {
      display: flex; flex-direction: column; justify-content: space-between;
      font-size: 0.68rem; color: var(--text-light); padding: 0 5px 0 0;
      font-weight: 600; writing-mode: vertical-rl; text-orientation: mixed;
      align-items: flex-end; gap: 0;
    }
    .axis-label-left span { writing-mode: horizontal-tb; font-size: 0.68rem; }
    .type-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; flex: 1;
    }
    .type-cell {
      border-radius: 11px; padding: 8px 5px; text-align: center;
      cursor: pointer; transition: all 0.18s; border: 2px solid transparent;
      position: relative;
    }
    .type-cell:hover { transform: scale(1.06); z-index: 2; }
    .type-cell.selected { border-color: #fff; box-shadow: 0 0 0 3px #f06292, 0 4px 14px rgba(240,98,146,0.4); transform: scale(1.08); z-index: 3; }
    .type-cell.highlight { box-shadow: 0 0 0 3px #9c6fc9, 0 4px 16px rgba(156,111,201,0.5); transform: scale(1.1); z-index: 4; }
    .cell-icon { font-size: 1.3rem; }
    .cell-name { font-size: 0.58rem; font-weight: 700; color: rgba(255,255,255,0.92); margin-top: 2px; line-height: 1.2; }

    /* ── Result Type Card ── */
    .result-hero {
      border-radius: 18px; padding: 30px; text-align: center;
      color: white; margin-bottom: 20px;
    }
    .result-hero .r-icon { font-size: 3.2rem; margin-bottom: 10px; }
    .result-hero .r-pos { font-size: 0.72rem; font-weight: 700; opacity: 0.82; letter-spacing: 2px; margin-bottom: 3px; }
    .result-hero .r-name { font-size: 1.75rem; font-weight: 900; margin-bottom: 8px; }
    .result-hero .r-catch { font-size: 0.87rem; opacity: 0.9; line-height: 1.7; }

    /* ── Trait tags ── */
    .traits-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
    .tag { padding: 5px 13px; border-radius: 50px; font-size: 0.82rem; font-weight: 600; background: var(--pink-light); color: var(--pink); }

    /* ── Section heading ── */
    .s-title { font-size: 1rem; font-weight: 800; margin-bottom: 13px; display: flex; align-items: center; gap: 7px; }

    /* ── Axis score bars ── */
    .score-bars { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .bar-row { display: flex; align-items: center; gap: 8px; }
    .bar-axis { font-size: 0.78rem; color: var(--text-mid); width: 56px; text-align: right; flex-shrink: 0; }
    .bar-track { flex: 1; height: 18px; background: var(--pink-pale); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
    .bar-pct { font-size: 0.78rem; color: var(--text-mid); width: 32px; flex-shrink: 0; }

    /* ── Compat item ── */
    .compat-item {
      display: flex; align-items: flex-start; gap: 11px;
      background: var(--pink-pale); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
    }
    .compat-item .ci-icon { font-size: 1.5rem; flex-shrink: 0; }
    .compat-item .ci-body { flex: 1; }
    .compat-item .ci-name { font-size: 0.87rem; font-weight: 800; margin-bottom: 2px; }
    .compat-item .ci-score { font-size: 0.78rem; color: var(--pink); font-weight: 700; margin-bottom: 3px; }
    .compat-item .ci-desc { font-size: 0.8rem; color: var(--text-mid); line-height: 1.6; }

    /* ── Compat result band ── */
    .compat-band { border-radius: 16px; overflow: hidden; display: none; margin-top: 20px; }
    .compat-band.show { display: block; animation: fadeUp 0.4s ease; }
    .band-top { padding: 26px; text-align: center; color: white; }
    .band-hearts { font-size: 1.6rem; letter-spacing: 3px; margin-bottom: 6px; }
    .band-score { font-size: 3.8rem; font-weight: 900; line-height: 1; }
    .band-label { font-size: 0.88rem; opacity: 0.88; margin-top: 4px; }
    .band-body { background: var(--pink-pale); padding: 22px; }
    .band-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 8px; }
    .band-desc { font-size: 0.88rem; color: var(--text-mid); line-height: 1.8; margin-bottom: 14px; }
    .band-points { display: flex; flex-direction: column; gap: 8px; }
    .band-point { background: white; border-radius: 11px; padding: 11px 14px; font-size: 0.83rem; color: var(--text-mid); line-height: 1.6; }
    .band-point strong { color: var(--text-dark); }

    /* ── Type detail ── */
    .type-detail { display: none; }
    .type-detail.show { display: block; animation: fadeUp 0.3s ease; }

    /* ── Position grid in result ── */
    .position-grid-wrap { margin-bottom: 20px; }
    .mini-grid-outer { display: flex; align-items: flex-start; gap: 5px; margin-top: 6px; }
    .mini-axis-left {
      display: flex; flex-direction: column; justify-content: space-around;
      font-size: 0.65rem; color: var(--text-light); height: 140px; flex-shrink: 0;
    }
    .mini-axis-left span { writing-mode: horizontal-tb; }
    .mini-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; flex: 1;
    }
    .mini-cell {
      height: 32px; border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-size: 0.9rem; transition: all 0.2s;
      opacity: 0.55;
    }
    .mini-cell.me { opacity: 1; box-shadow: 0 0 0 2.5px white, 0 0 0 4px #f06292; transform: scale(1.12); z-index: 1; position: relative; }

    /* ── Type Overview tab ── */
    .overview-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      margin-bottom: 16px;
    }
    @media(max-width:520px) { .overview-grid { grid-template-columns: repeat(2,1fr); } }
    .ov-cell {
      border-radius: 14px; overflow: hidden; cursor: pointer;
      box-shadow: var(--shadow-sm); transition: all 0.2s;
    }
    .ov-cell:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .ov-cell.active { box-shadow: 0 0 0 3px #f06292, var(--shadow); }
    .ov-head { padding: 14px 10px 10px; text-align: center; color: white; }
    .ov-head .ov-icon { font-size: 1.8rem; margin-bottom: 4px; }
    .ov-head .ov-name { font-size: 0.72rem; font-weight: 800; }
    .ov-body { background: white; padding: 8px 10px 10px; }
    .ov-short { font-size: 0.68rem; color: var(--text-mid); line-height: 1.5; margin-bottom: 6px; }
    .ov-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .ov-tag { font-size: 0.62rem; padding: 2px 8px; border-radius: 50px; font-weight: 600; }

    /* ── Compat type selectors (16 in grid) ── */
    .sel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 16px; }
    .sel-cell {
      border-radius: 10px; padding: 8px 4px; text-align: center;
      cursor: pointer; border: 2px solid transparent; transition: all 0.18s;
    }
    .sel-cell:hover { transform: scale(1.06); }
    .sel-cell.selected { border-color: white; box-shadow: 0 0 0 3px #f06292; }
    .sel-cell .sc-icon { font-size: 1.2rem; }
    .sel-cell .sc-name { font-size: 0.56rem; font-weight: 700; color: rgba(255,255,255,0.9); margin-top: 2px; line-height: 1.2; }

    /* ── Axis labels ── */
    .axis-row { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-light); font-weight: 600; margin-bottom: 4px; padding: 0 2px; }
    .sel-grid-wrap { position: relative; }
    .sel-left-labels {
      position: absolute; left: -38px; top: 0; bottom: 0;
      display: flex; flex-direction: column; justify-content: space-between;
      font-size: 0.65rem; color: var(--text-light); font-weight: 600;
    }

    footer { text-align: center; padding: 16px; color: var(--text-light); font-size: 0.75rem; }
  </style>
</head>
<body>

<header>
  <div class="header-emojis">💬 💕 👂</div>
  <h1>恋愛相性タイプ診断</h1>
  <p>話し方・聴き方のスタイルでわかる、あなたの恋愛タイプ（16種類）</p>
</header>

<main>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('diagnose',this)">🔍 診断する</button>
    <button class="nav-tab" onclick="showTab('compat',this)">💕 相性チェック</button>
    <button class="nav-tab" onclick="showTab('types',this)">📖 タイプ一覧</button>
  </div>

  <!-- ===== 診断タブ ===== -->
  <div id="tab-diagnose" class="section active">

    <div id="q-start" class="card">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:2.5rem;margin-bottom:10px;">🔍</div>
        <h2 style="font-size:1.3rem;margin-bottom:8px;">あなたのタイプを診断しよう</h2>
        <p style="color:var(--text-mid);font-size:0.88rem;">全12問・約3分</p>
      </div>
      <p style="color:var(--text-mid);font-size:0.88rem;line-height:1.8;margin-bottom:22px;">
        「聴く」か「話す」か、「ゆっくり」か「はやく」か——2つの軸を<strong>4段階</strong>で細かく測定。
        微妙なニュアンスまで拾って、16タイプのうちあなたはどこに位置するかを診断します。
      </p>
      <button class="btn-full" onclick="startQuiz()">診断スタート ▶</button>
    </div>

    <div id="q-form" class="card" style="display:none;">
      <div class="progress-wrap">
        <div class="progress-labels">
          <span id="q-label">質問 1 / 8</span>
          <span id="q-pct-label">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="q-fill" style="width:0%"></div></div>
      </div>
      <div id="q-area"></div>
      <div class="nav-btns">
        <button class="btn btn-prev" id="btn-prev" onclick="prevQ()" style="display:none;">◀ 前へ</button>
        <button class="btn btn-next" id="btn-next" onclick="nextQ()" disabled>次へ ▶</button>
      </div>
    </div>

    <div id="q-loading" class="card loading-wrap" style="display:none;">
      <div class="pulse">💕</div>
      <p style="margin-top:14px;color:var(--text-mid);">タイプを分析中…</p>
    </div>

    <div id="q-result" style="display:none;"></div>

  </div>

  <!-- ===== 相性チェックタブ ===== -->
  <div id="tab-compat" class="section">
    <div class="card">
      <div class="s-title">👤 あなたのタイプ</div>
      <div class="axis-row"><span>← 聴く</span><span>話す →</span></div>
      <div style="position:relative;padding-left:40px;">
        <div class="sel-left-labels" id="compat-my-left"></div>
        <div class="sel-grid" id="compat-my-grid"></div>
      </div>

      <div style="text-align:center;font-size:1.4rem;margin:10px 0;color:var(--pink);">💕 × 💕</div>

      <div class="s-title">💑 相手のタイプ</div>
      <div class="axis-row"><span>← 聴く</span><span>話す →</span></div>
      <div style="position:relative;padding-left:40px;">
        <div class="sel-left-labels" id="compat-partner-left"></div>
        <div class="sel-grid" id="compat-partner-grid"></div>
      </div>

      <button class="btn-full" id="compat-btn" onclick="doCheckCompat()" disabled style="margin-top:20px;">
        相性を診断する 💕
      </button>
    </div>

    <div class="compat-band" id="compat-band">
      <div class="band-top" id="band-top"></div>
      <div class="band-body" id="band-body"></div>
    </div>
  </div>

  <!-- ===== タイプ一覧タブ ===== -->
  <div id="tab-types" class="section">
    <div class="card">
      <div class="s-title">🗂️ 16タイプ一覧</div>
      <p style="font-size:0.8rem;color:var(--text-light);margin-bottom:12px;">タイプをタップすると詳細と相性が見られます</p>
      <div class="axis-row"><span>← 聴く</span><span>話す →</span></div>
      <div style="position:relative;padding-left:40px;">
        <div class="sel-left-labels" id="types-left-labels"></div>
        <div class="overview-grid" id="overview-grid"></div>
      </div>
    </div>
    <div id="type-detail-area"></div>
  </div>

</main>

<footer>💕 恋愛相性タイプ診断 — 16タイプ版</footer>

<script>
// ================================================================
//  DATA: 16 TYPES
//  axis1: 1=深聴き, 2=やや聴き, 3=やや話し, 4=深話し
//  axis2: 1=のんびり, 2=ゆったり, 3=さくさく, 4=ぱっぱ
// ================================================================
const T16 = [
  // axis1=1 (深聴き) ──────────────────────────────────────────
  { id:'1-1', a1:1, a2:1, icon:'🌊', name:'深海の聴き手',
    short:'極上の聴き手・のんびり派',
    catch:'誰よりも深く聴き、ゆっくり言葉を選ぶ。\n静かな海のような安心感が魅力。',
    traits:['極上の聴き手','ゆったり','思慮深い','癒し系','言葉を大切に'],
    desc:'相手の話を誰よりも深く聴き、言葉を丁寧に選んで返す。焦らないそのペースが、話す人にとって最高の安心感になる。感情を急かさず、じっくり向き合ってくれる存在。' },
  { id:'1-2', a1:1, a2:2, icon:'🌙', name:'月夜の共感者',
    short:'深い聴き手・落ち着きペース',
    catch:'深く聴いて、落ち着いたペースで丁寧に応える。\n月明かりのような静かな包容力。',
    traits:['聴き上手','落ち着き','共感力高い','丁寧','ロマンチスト'],
    desc:'相手の言葉の奥にある気持ちまで汲み取る聴き手。ゆったりとしたペースで、相手が話し終わってからじっくり返す。急かさず、でも確かに寄り添ってくれる。' },
  { id:'1-3', a1:1, a2:3, icon:'🌸', name:'春風の聴き手',
    short:'深い聴き手・テンポよい反応',
    catch:'深く聴きながら、テンポよく反応する。\n場を軽やかに盛り上げる名バイプレーヤー。',
    traits:['聴き上手','テンポ感','機転が利く','明るい','反応がいい'],
    desc:'聴くことが得意なのに、反応やリアクションはテンポよい。相手が気持ちよく話し続けられる環境を自然につくれる。話していて楽しい聴き手。' },
  { id:'1-4', a1:1, a2:4, icon:'⚡', name:'電光の共感者',
    short:'深い聴き手・超速反応',
    catch:'深く聴くが、相槌や反応が超スピード。\nエネルギッシュに話を引き出す。',
    traits:['聴き上手','反応超速','エネルギッシュ','好奇心旺盛','引き出し上手'],
    desc:'聴くことへの情熱はトップクラス。でも反応はとにかく速くて、どんどん話を引き出す。一緒にいると相手が気づかないうちにたくさん話していることが多い。' },

  // axis1=2 (やや聴き) ──────────────────────────────────────────

function getType(id) { return T16.find(t => t.id === id); }

function typeColor(a1, a2) {
  // a1: 1→4 (listener→talker), hue: 220→340
  // a2: 1→4 (slow→fast), sat: 45→80%, lig: 70→57%
  const h = 220 + (a1-1)*40;
  const s = 45  + (a2-1)*12;
  const l = 70  - (a2-1)*4;
  return `hsl(${h},${s}%,${l}%)`;
}
function typeGrad(a1, a2) {
  const h = 220 + (a1-1)*40;
  const s = 45  + (a2-1)*12;
  const l = 70  - (a2-1)*4;
  return `linear-gradient(135deg,hsl(${h},${s}%,${l}%),hsl(${h+18},${s+6}%,${l-5}%))`;
}
function tagStyle(a1, a2) {
  const h = 220 + (a1-1)*40;
  return `background:hsl(${h},50%,93%);color:hsl(${h},60%,40%)`;
}

// Compatibility score (0-100)
const TALK_SCORES = {2:20, 3:30, 4:42, 5:50, 6:42, 7:30, 8:18};
const SPEED_SCORES = [50, 40, 25, 10];
function calcCompat(tA, tB) {
  const talkScore  = TALK_SCORES[tA.a1 + tB.a1] ?? 18;
  const speedScore = SPEED_SCORES[Math.abs(tA.a2 - tB.a2)];
  return talkScore + speedScore;
}

// Compat description generator
function compatText(tA, tB, score) {
  const sum = tA.a1 + tB.a1;
  const sd = Math.abs(tA.a2 - tB.a2);
  const td = tB.a1 - tA.a1;

  let roleTitle, roleDesc;
  if (sum <= 4) {
    roleTitle = '二人とも深い聴き手';
    roleDesc = '両方が聴き手のため、会話の発信者が不在になりがち。意識的に話す努力が必要です。';
  } else if (sum === 5) {
    roleTitle = td > 0 ? 'あなたが聴き役、相手が話し役' : 'あなたが話し役、相手が聴き役';
    roleDesc = '役割の補完が自然にできる最高のバランス。会話のやりとりが心地よく続きます。';
  } else if (sum === 6) {
    roleTitle = '聴く・話すのバランスが近い';
    roleDesc = '役割が似ているため、両方が話そうとするか両方が待ちになるか。意識的な調整で良い関係に。';
  } else if (sum <= 7) {
    roleTitle = td > 0 ? 'あなたが聴き寄り、相手が話し寄り' : 'あなたが話し寄り、相手が聴き寄り';
    roleDesc = '役割分担があり、補完し合える関係。ただし両方とも程よく話せるので会話が詰まることは少ない。';
  } else {
    roleTitle = '二人とも話し好き';
    roleDesc = '会話は盛り上がる一方、お互い「もっと聴いてほしい」と感じることも。聴くターンを意識して。';
  }

  const speedTitle = ['スピードがぴったり一致！', 'スピード差はわずか', 'スピード差がやや大きめ', 'スピード差がかなり大きい'][sd];
  const speedDesc = [
    '話すテンポが完全に合います。お互いのリズムで気持ちよく会話できます。',
    '少しだけテンポが違いますが、すぐに慣れる範囲。自然に合わせられます。',
    'テンポ差があるため、一方が急かされたり待たされたりする場面が出てきます。意識的な歩み寄りが鍵。',
    'テンポ差がかなり大きいです。速い方が意識的に落ち着く、ゆっくりな方が意識的に反応を速めるなど、お互いの配慮が必要です。'
  ][sd];

  const scoreLabel = score >= 88 ? '最高の相性！' : score >= 75 ? '相性良好◎' : score >= 60 ? '相性○（工夫次第で良い関係に）' : '個性が際立つ相性（挑戦的な組み合わせ）';

  return { roleTitle, roleDesc, speedTitle, speedDesc, scoreLabel };
}

function scoreHearts(score) {
  if (score >= 88) return '❤️❤️❤️❤️❤️';
  if (score >= 75) return '❤️❤️❤️❤️🤍';
  if (score >= 60) return '❤️❤️❤️🤍🤍';
  return '❤️❤️🤍🤍🤍';
}
function scoreGrad(score) {
  if (score >= 88) return 'linear-gradient(135deg,#f06292,#e91e63)';
  if (score >= 75) return 'linear-gradient(135deg,#ffb74d,#ff8a65)';
  if (score >= 60) return 'linear-gradient(135deg,#9c6fc9,#673ab7)';
  return 'linear-gradient(135deg,#64b5f6,#1565c0)';
}

      { score:1, text:'焚き火のそば——言葉がゆっくり燃えるように、じっくりと深く。急かされず、一言一言を味わいたい' },
      { score:4, text:'お祭りの屋台——次々と話題が変わって、にぎやかで楽しい。テンポが速くても、それが心地よい' },
      { score:2, text:'夕暮れの散歩——落ち着いたペースで、大切なことをじっくり。急がず、でも確かに進んでいく感じ' }] },
];

let qState = { cur:0, answers:[], shuffled:[] };

function posFromScore(sum, n) {
  // n = number of questions per axis (each scored 1-4)
  // Normalize to 0-1, then map to position 1-4
  const min = n, max = n * 4, range = max - min;
  const norm = (sum - min) / range;
  if (norm < 0.25) return 1;
  if (norm < 0.50) return 2;
  if (norm < 0.75) return 3;
  return 4;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  // Pre-shuffle option order for each question (stored so Back button shows same order)
  const shuffled = QUESTIONS.map(q => shuffle(q.opts));
  qState = { cur:0, answers:new Array(12).fill(null), shuffled };
  document.getElementById('q-start').style.display = 'none';
  document.getElementById('q-form').style.display = 'block';
  renderQ();
}

function renderQ() {
  const q = QUESTIONS[qState.cur];
  const total = QUESTIONS.length;
  const pct = Math.round(qState.cur / total * 100);
  document.getElementById('q-label').textContent = `質問 ${qState.cur+1} / ${total}`;
  document.getElementById('q-pct-label').textContent = `${pct}%`;
  document.getElementById('q-fill').style.width = `${pct}%`;

  const selScore = qState.answers[qState.cur]; // stored as score value
  const shuffledOpts = qState.shuffled[qState.cur];
  document.getElementById('q-area').innerHTML = `
    <div class="q-anim">
      <span class="q-badge">Q${qState.cur+1}</span>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${shuffledOpts.map((o, i) => `
          <button class="opt-btn${selScore===o.score?' selected':''}" data-score="${o.score}" onclick="selectOpt(${o.score})">
            <span class="opt-num">${['A','B','C','D'][i]}</span>${o.text}
          </button>
        `).join('')}
      </div>
    </div>`;

  document.getElementById('btn-prev').style.display = qState.cur === 0 ? 'none' : '';
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = qState.cur === total-1 ? '診断結果を見る ✨' : '次へ ▶';
  btnNext.disabled = sel === null;
}

function selectOpt(score) {
  qState.answers[qState.cur] = score;
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.score) === score);
  });
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  if (qState.answers[qState.cur] === null) return;
  if (qState.cur < QUESTIONS.length-1) { qState.cur++; renderQ(); }
  else showQuizLoading();
}
function prevQ() { if (qState.cur > 0) { qState.cur--; renderQ(); } }

function showQuizLoading() {
  document.getElementById('q-form').style.display = 'none';
  document.getElementById('q-loading').style.display = 'block';
  setTimeout(computeAndShow, 1300);
}

function computeAndShow() {
  let a1sum = 0, a2sum = 0, a1n = 0, a2n = 0;
  QUESTIONS.forEach((q, i) => {
    const score = qState.answers[i]; // already the score (1-4)
    if (q.axis === 1) { a1sum += score; a1n++; }
    else              { a2sum += score; a2n++; }
  });
  const a1pos = posFromScore(a1sum, a1n);
  const a2pos = posFromScore(a2sum, a2n);
  const typeId = `${a1pos}-${a2pos}`;
  const type = getType(typeId);

  document.getElementById('q-loading').style.display = 'none';
  const area = document.getElementById('q-result');
  area.style.display = 'block';
  area.innerHTML = buildResultHTML(type, a1sum, a2sum, a1n, a2n);
  // animate bars: score range = [n, n*4], span = n*3
  setTimeout(() => {
    const lPct = Math.min(100, Math.round((a1sum - a1n) / (a1n * 3) * 100));
    const sPct = Math.min(100, Math.round((a2sum - a2n) / (a2n * 3) * 100));
    document.getElementById('bar-a1').style.width = `${lPct}%`;
    document.getElementById('bar-a2').style.width = `${sPct}%`;
    document.getElementById('pct-a1').textContent = `${lPct}%`;
    document.getElementById('pct-a2').textContent = `${sPct}%`;
  }, 100);
}

function buildResultHTML(type, a1sum, a2sum, a1n, a2n) {
  const grad = typeGrad(type.a1, type.a2);
  const a1label = ['深聴き','やや聴き','やや話し','深話し'][type.a1-1];
  const a2label = ['のんびり','ゆったり','さくさく','ぱっぱ'][type.a2-1];

  // Sorted compat
  const compatList = T16
    .filter(t => t.id !== type.id)
    .map(t => ({ t, score: calcCompat(type, t) }))
    .sort((a,b) => b.score - a.score);

  const top3 = compatList.slice(0, 3);
  const bot3 = compatList.slice(-3).reverse();

  // Mini grid
  const miniCells = buildMiniGridCells(type.id);

  return `
    <div class="result-hero" style="background:${grad}">
      <div class="r-icon">${type.icon}</div>
      <div class="r-pos">TYPE ${type.id} ／ ${a1label} × ${a2label}</div>
      <div class="r-name">${type.name}</div>
      <div class="r-catch">${type.catch}</div>
    </div>

    <div class="card">
      <div class="s-title">🗺️ あなたのポジション</div>
      <div class="axis-row"><span>← 聴く</span><span>話す →</span></div>
      ${miniCells}

      <div class="s-title" style="margin-top:20px;">📊 スコア詳細</div>
      <div class="score-bars">
        <div class="bar-row">
          <div class="bar-axis">聴く→話す</div>
          <div class="bar-track"><div class="bar-fill" id="bar-a1" style="width:0%;background:linear-gradient(90deg,#f06292,#9c6fc9)"></div></div>
          <div class="bar-pct" id="pct-a1">0%</div>
        </div>
        <div class="bar-row">
          <div class="bar-axis">ゆっくり→はやく</div>
          <div class="bar-track"><div class="bar-fill" id="bar-a2" style="width:0%;background:linear-gradient(90deg,#80cbc4,#ff8a65)"></div></div>
          <div class="bar-pct" id="pct-a2">0%</div>
        </div>
      </div>
      <p style="font-size:0.75rem;color:var(--text-light);margin-bottom:20px;">※ バーが中央より左=聴き/ゆっくり寄り、右=話し/はやく寄り</p>

      <div class="s-title">✨ あなたの特徴</div>
      <div class="traits-row">
        ${type.traits.map(tr => `<span class="tag" style="${tagStyle(type.a1,type.a2)}">${tr}</span>`).join('')}
      </div>

      <div class="s-title">💬 詳細説明</div>
      <p style="color:var(--text-mid);font-size:0.88rem;line-height:1.8;margin-bottom:22px;">${type.desc}</p>

      <div class="s-title">❤️ 相性ランキング（上位3タイプ）</div>
      ${top3.map(({t,score}) => compatItemHTML(t, score, type)).join('')}

      <div class="s-title" style="margin-top:16px;">💔 ちょっと難しい相手（下位3タイプ）</div>
      ${bot3.map(({t,score}) => compatItemHTML(t, score, type)).join('')}

      <div style="margin-top:20px;">
        <button class="btn-full" onclick="copyResult('${type.id}')">📋 結果をコピーしてシェア</button>
        <button class="btn-outline" onclick="resetQuiz()">🔄 もう一度診断する</button>
      </div>
    </div>
  `;
}

function buildMiniGridCells(myId) {
  // axis2 (rows, top=slow) × axis1 (cols, left=listener)
  let cells = '';
  for (let a2=1; a2<=4; a2++) {
    for (let a1=1; a1<=4; a1++) {
      const id = `${a1}-${a2}`;
      const t = getType(id);
      const isMe = id === myId;
      const bg = typeColor(a1, a2);
      cells += `<div class="mini-cell${isMe?' me':''}" style="background:${bg}">${t.icon}</div>`;
    }
  }
  const rowLabels = ['のんびり','ゆったり','さくさく','ぱっぱ'];
  return `
    <div style="display:flex;gap:4px;align-items:flex-start;margin-bottom:6px;">
      <div style="display:flex;flex-direction:column;justify-content:space-around;height:148px;flex-shrink:0;padding-right:4px;padding-top:4px;padding-bottom:4px;">
        ${rowLabels.map(l=>`<span style="font-size:0.62rem;color:var(--text-light);font-weight:600;">${l}</span>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px;flex:1;">
        ${cells}
      </div>
    </div>
    <p style="font-size:0.72rem;color:var(--text-light);text-align:center;margin-bottom:6px;">🔵 が紫枠 = あなたのポジション</p>
  `;
}

function compatItemHTML(t, score, myType) {
  const hearts = scoreHearts(score);
  const txt = compatText(myType, t, score);
  return `
    <div class="compat-item">
      <div class="ci-icon" style="background:${typeColor(t.a1,t.a2)};width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">${t.icon}</div>
      <div class="ci-body">
        <div class="ci-name">${t.name}（TYPE ${t.id}）</div>
        <div class="ci-score">${hearts} 相性スコア ${score}点</div>
        <div class="ci-desc">${txt.roleTitle}。${txt.speedTitle}</div>
      </div>
    </div>`;
}

function resetQuiz() {
  document.getElementById('q-result').style.display = 'none';
  document.getElementById('q-result').innerHTML = '';
  document.getElementById('q-start').style.display = 'block';
}

function copyResult(typeId) {
  const t = getType(typeId);
  const text = `【恋愛相性タイプ診断 16タイプ版】\nわたしは「${t.name}（TYPE ${t.id}）」でした！\n${t.catch}`;
  navigator.clipboard.writeText(text).then(() => alert('コピーしました！'));
}

// ================================================================
//  COMPAT TAB
// ================================================================
let cState = { my: null, partner: null };

function buildCompatTab() {
  ['my','partner'].forEach(who => {
    const grid = document.getElementById(`compat-${who}-grid`);
    const leftLabel = document.getElementById(`compat-${who}-left`);
    buildSelGrid(grid, who);
    buildLeftLabels(leftLabel);
  });
}

function buildLeftLabels(el) {
  const labels = ['のんびり','ゆったり','さくさく','ぱっぱ'];
  el.innerHTML = labels.map(l => `<span>${l}</span>`).join('');
}

function buildSelGrid(grid, who) {
  let html = '';
  for (let a2=1; a2<=4; a2++) {
    for (let a1=1; a1<=4; a1++) {
      const t = getType(`${a1}-${a2}`);
      html += `
        <div class="sel-cell" id="sc-${who}-${t.id}"
          style="background:${typeColor(a1,a2)}"
          onclick="selectCompatType('${who}','${t.id}')">
          <div class="sc-icon">${t.icon}</div>
          <div class="sc-name">${t.name}</div>
        </div>`;
    }
  }
  grid.innerHTML = html;
}

function selectCompatType(who, id) {
  if (who==='my') cState.my = id;
  else cState.partner = id;

  document.querySelectorAll(`[id^="sc-${who}-"]`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`sc-${who}-${id}`).classList.add('selected');

  document.getElementById('compat-btn').disabled = !(cState.my && cState.partner);
}

function doCheckCompat() {
  const tA = getType(cState.my);
  const tB = getType(cState.partner);
  const score = calcCompat(tA, tB);
  const txt = compatText(tA, tB, score);

  const band = document.getElementById('compat-band');
  band.className = 'compat-band show';
  band.scrollIntoView({ behavior:'smooth', block:'nearest' });

  document.getElementById('band-top').style.background = scoreGrad(score);
  document.getElementById('band-top').innerHTML = `
    <div class="band-hearts">${scoreHearts(score)}</div>
    <div class="band-score">${score}</div>
    <div class="band-label">${txt.scoreLabel}</div>`;

  document.getElementById('band-body').innerHTML = `
    <div class="band-title">${tA.icon} ${tA.name}  ×  ${tB.icon} ${tB.name}</div>
    <div class="band-desc">
      <strong>話す量：</strong>${txt.roleDesc}<br>
      <strong>スピード：</strong>${txt.speedDesc}
    </div>
    <div class="band-points">
      <div class="band-point"><strong>役割分担：</strong>${txt.roleTitle}</div>
      <div class="band-point"><strong>テンポ差：</strong>${txt.speedTitle}</div>
      <div class="band-point">
        ${score >= 75 ? '✅ この組み合わせは自然に会話のリズムが合いやすいです。' :
          score >= 60 ? '💛 少し意識的に相手のペースに合わせる努力があると、とても良い関係になれます。' :
          '⚠️ 二人のスタイルが大きく違います。でも違いを楽しめる二人なら、かえって刺激的な関係に！'}
      </div>
    </div>`;
}

// ================================================================
//  TYPES TAB
// ================================================================
let selectedOverview = null;

function buildTypesTab() {
  const grid = document.getElementById('overview-grid');
  const leftLabels = document.getElementById('types-left-labels');
  buildLeftLabels(leftLabels);

  let html = '';
  for (let a2=1; a2<=4; a2++) {
    for (let a1=1; a1<=4; a1++) {
      const t = getType(`${a1}-${a2}`);
      html += `
        <div class="ov-cell" id="ov-${t.id}" onclick="showTypeDetail('${t.id}')">
          <div class="ov-head" style="background:${typeGrad(a1,a2)}">
            <div class="ov-icon">${t.icon}</div>
            <div class="ov-name">${t.name}</div>
          </div>
          <div class="ov-body">
            <div class="ov-short">${t.short}</div>
            <div class="ov-tags">
              ${t.traits.slice(0,3).map(tr=>`<span class="ov-tag" style="${tagStyle(a1,a2)}">${tr}</span>`).join('')}
            </div>
          </div>
        </div>`;
    }
  }
  grid.innerHTML = html;
}

function showTypeDetail(id) {
  if (selectedOverview) document.getElementById(`ov-${selectedOverview}`)?.classList.remove('active');
  selectedOverview = id;
  document.getElementById(`ov-${id}`).classList.add('active');

  const t = getType(id);
  const compatSorted = T16
    .filter(x => x.id !== id)
    .map(x => ({ t:x, score:calcCompat(t,x) }))
    .sort((a,b) => b.score - a.score);

  const area = document.getElementById('type-detail-area');
  area.innerHTML = `
    <div class="card type-detail show">
      <div class="result-hero" style="background:${typeGrad(t.a1,t.a2)};margin-bottom:18px;">
        <div class="r-icon">${t.icon}</div>
        <div class="r-pos">TYPE ${t.id}　${['深聴き','やや聴き','やや話し','深話し'][t.a1-1]} × ${['のんびり','ゆったり','さくさく','ぱっぱ'][t.a2-1]}</div>
        <div class="r-name">${t.name}</div>
        <div class="r-catch">${t.catch}</div>
      </div>
      <div class="traits-row">
        ${t.traits.map(tr=>`<span class="tag" style="${tagStyle(t.a1,t.a2)}">${tr}</span>`).join('')}
      </div>
      <p style="color:var(--text-mid);font-size:0.88rem;line-height:1.8;margin-bottom:20px;">${t.desc}</p>

      <div class="s-title">💕 相性ランキング（上位5）</div>
      ${compatSorted.slice(0,5).map(({t:x,score}) => `
        <div class="compat-item">
          <div style="width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:${typeColor(x.a1,x.a2)};font-size:1.2rem;flex-shrink:0;">${x.icon}</div>
          <div class="ci-body">
            <div class="ci-name">${x.name}（TYPE ${x.id}）</div>
            <div class="ci-score">${scoreHearts(score)} ${score}点</div>
          </div>
        </div>`).join('')}
    </div>`;

  area.querySelector('.type-detail').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ================================================================
//  TABS
// ================================================================
function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${id}`).classList.add('active');
  btn.classList.add('active');
}

// ================================================================
//  INIT
// ================================================================
buildCompatTab();
buildTypesTab();
</script>
